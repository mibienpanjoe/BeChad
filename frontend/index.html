<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BeChad | Level Up in Life, Women, and Work</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Markdown & DOMPurify -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <!-- Tailwind CSS v4 CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css" />

    <style type="text/tailwindcss">
      @theme {
        --color-obsidian: #0f172a;
        --color-slate-gray: #1e293b;
        --color-chad-gold: #eab308;
        --color-crimson: #dc2626;
        --color-frost: #f8fafc;
        --color-silver: #94a3b8;

        --font-outfit: "Outfit", sans-serif;
        --font-roboto: "Roboto", sans-serif;
      }
    </style>
  </head>
  <body
    class="bg-obsidian text-frost font-roboto h-screen flex flex-col overflow-hidden"
  >
    <!-- Header -->
    <header
      class="bg-obsidian/80 backdrop-blur-md border-b border-white/10 sticky top-0 z-10"
    >
      <div
        class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between"
      >
        <div class="flex items-center space-x-3">
          <img
            src="assets/logo.png"
            alt="BeChad Logo"
            class="h-12 w-12 object-contain rounded-md"
          />
          <div>
            <h1 class="font-outfit text-3xl tracking-wide text-frost">
              BECHAD
            </h1>
            <p class="text-sm text-silver tracking-widest uppercase mt-0.5">
              The Ultimate Mentor
            </p>
          </div>
        </div>
        <div>
          <button
            id="about-btn"
            class="text-silver hover:text-chad-gold transition-colors"
            title="About"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="w-6 h-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"
              />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Chat Container -->
    <main
      id="chat-container"
      class="flex-1 overflow-y-auto p-4 md:p-8 space-y-8 max-w-4xl w-full mx-auto pb-44"
    >
      <!-- Welcome Message (Bot) -->
      <div class="flex items-start w-full">
        <div class="flex-shrink-0 mr-4 mt-1">
          <img
            src="assets/logo.png"
            alt="BeChad"
            class="h-10 w-10 rounded-md border border-white/10"
          />
        </div>
        <div class="flex flex-col space-y-2 max-w-[85%]">
          <span class="text-xs text-silver font-medium">BeChad</span>
          <div
            class="text-frost border-l-4 border-chad-gold pl-5 text-lg leading-relaxed markdown-body"
          >
            <p>I am BeChad. Your mentor for Life, Women, and Work.</p>
            <p>
              You’re here because you want to level up. Ask your question and
              let’s get straight to it. No excuses.
            </p>
          </div>
        </div>
      </div>
    </main>

    <!-- Input Area -->
    <div
      class="bg-obsidian/90 backdrop-blur-md border-t border-white/10 absolute bottom-0 w-full"
    >
      <div class="max-w-4xl mx-auto p-4 md:p-6">
        <form
          id="chat-form"
          class="relative flex items-end bg-slate-gray rounded-lg border border-white/5 shadow-lg focus-within:border-chad-gold/50 focus-within:ring-1 focus-within:ring-chad-gold/50 transition-all"
        >
          <textarea
            id="user-input"
            rows="1"
            placeholder="Ask your mentor..."
            class="w-full bg-transparent text-frost p-5 pr-16 text-lg resize-none outline-none max-h-40 placeholder-silver/60"
          ></textarea>
          <button
            type="submit"
            id="send-btn"
            class="absolute right-2 bottom-2 p-2 bg-chad-gold hover:bg-yellow-400 text-obsidian rounded-md transition-all disabled:opacity-50 disabled:cursor-not-allowed"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="currentColor"
              class="w-6 h-6"
            >
              <path
                d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"
              />
            </svg>
          </button>
        </form>
        <div class="text-center mt-2">
          <p class="text-xs text-silver/60">
            BeChad can make mistakes. Apply guidance with your own judgment.
          </p>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
